name: tashlih_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.2.0
  image_picker: ^1.2.1
  firebase_auth: ^6.0.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.0.0
  

  # Live tracking
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2

  # Routes API
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  intl: ^0.19.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/lang/